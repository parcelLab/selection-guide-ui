<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Size Recommender Dev Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f3efe8;
        color: #10203c;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 40%),
          linear-gradient(180deg, #f7f1e7 0%, #eef2f8 100%);
      }

      main {
        margin: 0 auto;
        max-width: 900px;
        padding: 36px 20px 72px;
      }

      .shell {
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        align-items: start;
      }

      .controls {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(16, 32, 60, 0.08);
        border-radius: 24px;
        padding: 22px;
      }

      .controls h2 {
        font-size: 1.1rem;
        margin: 0 0 16px;
      }

      .field-grid {
        display: grid;
        gap: 14px;
      }

      .sample-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      label {
        color: #41536f;
        display: grid;
        font-size: 0.92rem;
        font-weight: 600;
        gap: 8px;
      }

      input,
      select,
      button {
        border: 1px solid #d4dcea;
        border-radius: 14px;
        color: #10203c;
        font: inherit;
        min-height: 46px;
        padding: 0 14px;
      }

      button {
        background: #10203c;
        border-color: #10203c;
        color: white;
        cursor: pointer;
        font-weight: 700;
      }

      button.secondary {
        background: white;
        color: #10203c;
      }

      button.sample-pill {
        background: #f6f8fc;
        border-color: #d4dcea;
        color: #41536f;
        font-size: 0.8rem;
        font-weight: 600;
        min-height: 34px;
        padding: 0 12px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .hint {
        color: #607089;
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 14px 0 0;
      }

      .widget-panel {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(16, 32, 60, 0.08);
        border-radius: 24px;
        padding: 24px;
      }

      .preview-stack {
        display: grid;
        gap: 16px;
        max-width: 380px;
      }

      .widget-panel h2 {
        font-size: 1rem;
        margin: 0;
      }

      .widget-preview {
        margin-top: 14px;
      }

      .embed-preview-title {
        color: #41536f;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      .card-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .card-subtitle {
        color: #607089;
        font-size: 0.84rem;
        line-height: 1.45;
        margin: 8px 0 0;
      }

      .code-card-actions {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .mode-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 16px 0 12px;
      }

      button.mode-pill {
        background: white;
        color: #41536f;
      }

      button.mode-pill.is-active {
        background: #10203c;
        border-color: #10203c;
        color: white;
      }

      button.icon-button {
        align-items: center;
        background: white;
        border-color: #d4dcea;
        color: #41536f;
        display: inline-flex;
        justify-content: center;
        min-height: 34px;
        min-width: 34px;
        padding: 0;
      }

      button.icon-button svg {
        display: block;
        height: 16px;
        width: 16px;
      }

      button.icon-button[data-copied='true'] {
        background: #10203c;
        border-color: #10203c;
        color: white;
      }

      .embed-preview {
        background: #0f1728;
        border-radius: 16px;
        color: #eef3ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.78rem;
        line-height: 1.55;
        margin: 0;
        overflow-x: auto;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 900px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="controls">
          <h2>Widget Controls</h2>
          <div class="field-grid">
            <div>
              <div class="embed-preview-title">Samples</div>
              <div class="sample-row">
                <button class="sample-pill" data-sample="pants" type="button">
                  Pants
                </button>
                <button class="sample-pill" data-sample="shirt" type="button">
                  Shirt
                </button>
              </div>
            </div>

            <label>
              Product ID
              <input
                id="product-id"
                name="productId"
                value="Men's Iver Pants (tailored fit)"
              />
            </label>

            <label>
              Account ID
              <input
                id="account-id"
                name="accountId"
                inputmode="numeric"
                value="1617954"
              />
            </label>

            <label>
              404 mode
              <select id="not-found-mode" name="notFoundMode">
                <option value="true-to-size">Fallback to likely true to size</option>
                <option value="empty">Show no data available</option>
              </select>
            </label>

            <label>
              Appearance
              <select id="appearance" name="appearance">
                <option value="neutral">Neutral</option>
                <option value="colored">Colored</option>
              </select>
            </label>

            <label>
              Density
              <select id="density" name="density">
                <option value="compact">Compact</option>
                <option value="comfortable">Comfortable</option>
              </select>
            </label>

            <label>
              Surface
              <select id="surface" name="surface">
                <option value="subtle">Subtle card</option>
                <option value="plain">Plain inline</option>
              </select>
            </label>
          </div>

          <div class="button-row">
            <button id="render-widget" type="button">Render widget</button>
            <button id="simulate-missing" class="secondary" type="button">
              Simulate 404 product
            </button>
          </div>

          <p class="hint">
            Use the sample requests or enter a product ID and account ID to preview
            the widget and copy the matching embed code.
          </p>
        </section>

        <div class="preview-stack">
          <section class="widget-panel">
            <h2>Embedded widget</h2>
            <div id="size-recommender-demo" class="widget-preview"></div>
          </section>

          <section class="widget-panel">
            <div class="card-header">
              <div>
                <h2>Embed code</h2>
                <p class="card-subtitle">
                  Choose the embed style you want to copy.
                </p>
              </div>
              <div class="code-card-actions">
                <button
                  id="copy-code"
                  class="icon-button"
                  type="button"
                  aria-label="Copy embed code"
                  title="Copy embed code"
                >
                  <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path d="M6.5 2A2.5 2.5 0 0 0 4 4.5v7A2.5 2.5 0 0 0 6.5 14H7V4.5A2.5 2.5 0 0 1 9.5 2H6.5Z" />
                    <path d="M9.5 3A1.5 1.5 0 0 0 8 4.5v9A1.5 1.5 0 0 0 9.5 15h5A1.5 1.5 0 0 0 16 13.5v-9A1.5 1.5 0 0 0 14.5 3h-5Z" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="mode-row">
              <button
                class="sample-pill mode-pill is-active"
                data-embed-mode="html"
                type="button"
              >
                HTML
              </button>
              <button
                class="sample-pill mode-pill"
                data-embed-mode="js"
                type="button"
              >
                JS init
              </button>
            </div>

            <pre class="embed-preview"><code id="embed-code"></code></pre>
          </section>
        </div>
      </div>
    </main>

    <script src="./dist/size-recommender.iife.js"></script>
    <script src="./dev/main.js"></script>
  </body>
</html>
